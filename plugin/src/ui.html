<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blend Open Paths</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body>
    <div class="app">
      <h1>Blend Open Paths</h1>
      <div class="section"><strong>Selection:</strong> <span id="selection-status">checking...</span></div>

      <div class="section">
        <label>Steps (N): <input type="number" id="steps" min="1" max="1000" value="8"></label>
        <label>Distribution:
          <select id="distribution">
            <option value="uniform">Uniform</option>
            <option value="fibonacci">Fibonacci</option>
          </select>
        </label>
      </div>

      <div class="section">
        <label><input type="checkbox" id="reverse"> Reverse</label>
        <label><input type="checkbox" id="smooth"> Smooth</label>
      </div>

      <div class="section">
        <label>Preview t: <input type="range" id="preview-t" min="0" max="1" step="0.01" value="0.5"></label>
        <span id="preview-value">0.50</span>
      </div>

      <div class="buttons">
        <button id="check-selection">Check Selection</button>
        <button id="preview">Preview</button>
        <button id="apply">Apply</button>
      </div>

      <div id="log" class="log"></div>
    </div>

    <script src="ui.js"></script>
  </body>
</html>
